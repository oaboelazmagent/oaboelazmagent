<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @keyframes blink {
        0%, 90%, 100% { opacity:1; }
        94%, 96% { opacity:0; }
      }
      .left-eye, .right-eye { animation: blink 3.5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="300" height="300" fill="#0D1117" rx="150"/>

  <!-- body -->
  <ellipse cx="150" cy="200" rx="45" ry="35" fill="#A0714F"/>

  <!-- head -->
  <circle cx="150" cy="135" r="55" fill="#A0714F"/>

  <!-- ears -->
  <circle cx="95" cy="115" r="22" fill="#8B5E3C"/>
  <circle cx="95" cy="115" r="13" fill="#C4956A"/>
  <circle cx="205" cy="115" r="22" fill="#8B5E3C"/>
  <circle cx="205" cy="115" r="13" fill="#C4956A"/>

  <!-- face -->
  <ellipse cx="150" cy="145" rx="38" ry="32" fill="#C4956A"/>

  <!-- eyes -->
  <g class="left-eye">
    <circle cx="132" cy="135" r="9" fill="white"/>
    <circle cx="134" cy="135" r="6" fill="#1a1a2e"/>
    <circle cx="136" cy="133" r="2.5" fill="white"/>
  </g>
  <g class="right-eye">
    <circle cx="168" cy="135" r="9" fill="white"/>
    <circle cx="170" cy="135" r="6" fill="#1a1a2e"/>
    <circle cx="172" cy="133" r="2.5" fill="white"/>
  </g>

  <!-- eyebrows -->
  <line x1="122" y1="120" x2="142" y2="126" stroke="#6D4C2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="178" y1="120" x2="158" y2="126" stroke="#6D4C2E" stroke-width="4" stroke-linecap="round"/>

  <!-- nose -->
  <circle cx="146" cy="150" r="4" fill="#8B5E3C"/>
  <circle cx="154" cy="150" r="4" fill="#8B5E3C"/>

  <!-- mouth -->
  <path d="M138 160 Q150 170 162 160" stroke="#6D4C2E" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- left arm -->
  <path d="M110 190 Q85 175 80 200" stroke="#A0714F" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="80" cy="202" r="8" fill="#C4956A"/>

  <!-- right arm -->
  <path d="M190 190 Q215 175 220 200" stroke="#A0714F" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="220" cy="202" r="8" fill="#C4956A"/>

  <!-- banana in right hand -->
  <ellipse cx="230" cy="195" rx="16" ry="8" fill="#FEE12B" transform="rotate(-20 230 195)"/>
  <ellipse cx="244" cy="188" rx="4" ry="7" fill="#8B4513" transform="rotate(-20 244 188)"/>

  <!-- legs -->
  <ellipse cx="130" cy="240" rx="12" ry="7" fill="#C4956A"/>
  <ellipse cx="170" cy="240" rx="12" ry="7" fill="#C4956A"/>
  <path d="M135 232 Q130 245 128 240" stroke="#A0714F" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M165 232 Q170 245 172 240" stroke="#A0714F" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- tail -->
  <path d="M155 170 Q185 125 175 95 Q165 70 155 80" stroke="#A0714F" stroke-width="5" fill="none" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="0 155 170;5 155 170;0 155 170;-3 155 170;0 155 170" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- banana thought bubble animation -->
  <g>
    <circle cx="150" cy="80" r="12" fill="white" opacity="0.8">
      <animate attributeName="cy" values="80;70;80" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="84" text-anchor="middle" font-size="14">🍌</text>
  </g>
</svg>
