<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @keyframes glance {
        0%, 100% { transform: translate(0,0); }
        25% { transform: translate(-4px,0); }
        50% { transform: translate(0,0); }
        75% { transform: translate(4px,0); }
      }
      @keyframes blink {
        0%, 92%, 100% { ry: 5; }
        96%, 98% { ry: 0.5; }
      }
      @keyframes lazy-tail {
        0%, 100% { transform: rotate(0deg); transform-origin: 140px 155px; }
        50% { transform: rotate(8deg); transform-origin: 140px 155px; }
      }
      @keyframes spin-banana {
        0%, 100% { transform: rotate(-12deg); transform-origin: 150px 255px; }
        50% { transform: rotate(12deg); transform-origin: 150px 255px; }
      }
      .head-group { animation: glance 3s ease-in-out infinite; }
      .eye-ball { animation: blink 4s ease-in-out infinite; }
      .tail-sway { animation: lazy-tail 3s ease-in-out infinite; }
      .banana-swing { animation: spin-banana 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- BG circle -->
  <circle cx="150" cy="150" r="135" fill="#0D1117"/>
  <circle cx="150" cy="150" r="125" fill="#58A6FF" opacity="0.05"/>

  <g class="head-group" transform="translate(150, 170)">
    <!-- Ears -->
    <circle cx="-42" cy="-35" r="20" fill="#8B5E3C"/>
    <circle cx="-42" cy="-35" r="12" fill="#C4956A"/>
    <circle cx="42" cy="-35" r="20" fill="#8B5E3C"/>
    <circle cx="42" cy="-35" r="12" fill="#C4956A"/>

    <!-- Head -->
    <circle cx="0" cy="-30" r="40" fill="#A0714F"/>

    <!-- Face -->
    <ellipse cx="0" cy="-10" rx="26" ry="22" fill="#C4956A"/>

    <!-- Eyes -->
    <circle cx="-12" cy="-20" r="7" fill="white"/>
    <ellipse cx="-11" cy="-20" rx="4" ry="5" fill="#1a1a2e" class="eye-ball"/>
    <circle cx="-10" cy="-22" r="1.5" fill="white"/>

    <circle cx="12" cy="-20" r="7" fill="white"/>
    <ellipse cx="13" cy="-20" rx="4" ry="5" fill="#1a1a2e" class="eye-ball"/>
    <circle cx="14" cy="-22" r="1.5" fill="white"/>

    <!-- Eyebrows (smug) -->
    <line x1="-16" y1="-31" x2="-5" y2="-28" stroke="#6D4C2E" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="-31" x2="5" y2="-28" stroke="#6D4C2E" stroke-width="3" stroke-linecap="round"/>

    <!-- Nostrils -->
    <circle cx="-3.5" cy="-2" r="3" fill="#8B5E3C"/>
    <circle cx="3.5" cy="-2" r="3" fill="#8B5E3C"/>

    <!-- Smirk mouth -->
    <path d="M-8,6 Q0,14 8,6" stroke="#6D4C2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="0" cy="35" rx="26" ry="20" fill="#A0714F"/>

    <!-- Arms -->
    <path d="M-24,28 Q-46,16 -38,42" stroke="#A0714F" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M24,28 Q46,16 38,42" stroke="#A0714F" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- Hands -->
    <circle cx="-38" cy="43" r="6" fill="#C4956A"/>
    <circle cx="38" cy="43" r="6" fill="#C4956A"/>

    <!-- Banana in right hand (swinging) -->
    <g class="banana-swing">
      <text x="44" y="40" text-anchor="middle" font-size="24">🍌</text>
    </g>

    <!-- Legs -->
    <path d="M-10,52 Q-15,68 -22,66" stroke="#A0714F" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M10,52 Q15,68 22,66" stroke="#A0714F" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="-24" cy="67" rx="7" ry="4" fill="#C4956A"/>
    <ellipse cx="24" cy="67" rx="7" ry="4" fill="#C4956A"/>
  </g>

  <!-- Tail (swaying) -->
  <path class="tail-sway" d="M20,45 Q50,50 55,30 Q60,10 48,18" stroke="#A0714F" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
