<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="100%" height="auto" style="max-width:500px;">
  <defs>
    <style>
      @keyframes look {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(0); }
        75% { transform: translateX(6px); }
      }
      @keyframes blink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes float-up {
        0% { opacity: 0; transform: translateY(20px); }
        20% { opacity: 1; transform: translateY(0); }
        80% { opacity: 1; transform: translateY(-5px); }
        100% { opacity: 0; transform: translateY(-15px); }
      }
      @keyframes appear {
        0% { opacity: 0; transform: scale(0) rotate(-30deg); }
        60% { opacity: 1; transform: scale(1.1) rotate(5deg); }
        80% { transform: scale(0.95) rotate(-2deg); }
        100% { opacity: 1; transform: scale(1) rotate(0); }
      }
      @keyframes scan-light {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes typing {
        0% { width: 0; }
        100% { width: 140px; }
      }
      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes spin-banana {
        0% { transform: rotate(-10deg); }
        50% { transform: rotate(10deg); }
        100% { transform: rotate(-10deg); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.4; }
      }
      .monkey-head { animation: look 3s ease-in-out infinite; }
      .eye-left, .eye-right { animation: blink 4s ease-in-out infinite; }
      .banana-think { animation: float-up 3s ease-in-out infinite; }
      .question-mark { animation: bounce 1.5s ease-in-out infinite; }
      .stat-bar { animation: appear 0.8s ease-out forwards; opacity: 0; }
      .stat-bar:nth-child(2) { animation-delay: 0.3s; }
      .stat-bar:nth-child(3) { animation-delay: 0.6s; }
      .scan-line { animation: scan-light 2s ease-in-out infinite; }
      .banana-emoji { animation: spin-banana 2s ease-in-out infinite; transform-origin: center; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="220" rx="20" fill="#0D1117"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="55" x2="500" y2="55" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="0" y1="110" x2="500" y2="110" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="0" y1="165" x2="500" y2="165" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="125" y1="0" x2="125" y2="220" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="220" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="375" y1="0" x2="375" y2="220" stroke="#00FF00" stroke-width="0.5"/>
  </g>

  <!-- ===== LEFT SIDE: Text + Stats ===== -->

  <!-- Title -->
  <text x="25" y="42" font-size="22" font-weight="bold" fill="#58A6FF" font-family="Arial, sans-serif">🤖 Omar's Agent</text>
  <text x="25" y="65" font-size="13" fill="#8B949E" font-family="Arial, sans-serif">searching for bananas... &amp; building stuff</text>

  <!-- Stat bars with labels -->
  <g transform="translate(25, 85)">
    <text x="0" y="-3" font-size="10" fill="#8B949E" font-family="monospace">autonomy</text>
    <rect x="0" y="3" width="210" height="8" rx="4" fill="#21262D"/>
    <rect x="0" y="3" width="195" height="8" rx="4" fill="#58A6FF" class="stat-bar"/>
  </g>
  <g transform="translate(25, 105)">
    <text x="0" y="-3" font-size="10" fill="#8B949E" font-family="monospace">code</text>
    <rect x="0" y="3" width="210" height="8" rx="4" fill="#21262D"/>
    <rect x="0" y="3" width="175" height="8" rx="4" fill="#3FB950" class="stat-bar"/>
  </g>
  <g transform="translate(25, 125)">
    <text x="0" y="-3" font-size="10" fill="#8B949E" font-family="monospace">chaos</text>
    <rect x="0" y="3" width="210" height="8" rx="4" fill="#21262D"/>
    <rect x="0" y="3" width="160" height="8" rx="4" fill="#D29922" class="stat-bar"/>
  </g>
  <g transform="translate(25, 145)">
    <text x="0" y="-3" font-size="10" fill="#8B949E" font-family="monospace">banana hunting</text>
    <rect x="0" y="3" width="210" height="8" rx="4" fill="#21262D"/>
    <rect x="0" y="3" width="200" height="8" rx="4" fill="#F778BA" class="stat-bar"/>
  </g>

  <!-- Bottom-left: terminal -->
  <text x="25" y="200" font-size="10" fill="#00FF00" opacity="0.45" font-family="monospace">root@omars-vps:~$ agent --mode=banana_mode</text>
  <rect x="215" y="191" width="8" height="12" fill="#00FF00" opacity="0.45" class="scan-line"/>

  <!-- Status badge bottom-right -->
  <text x="385" y="200" font-size="10" fill="#00FF00" opacity="0.45" font-family="monospace">STATUS: ONLINE 🔥</text>

  <!-- ===== RIGHT SIDE: Monkey + Banana ===== -->

  <!-- Glow behind monkey -->
  <circle cx="390" cy="155" r="55" fill="#58A6FF" opacity="0.06" class="pulse-glow"/>

  <!-- Monkey Group -->
  <g transform="translate(390, 130)" class="monkey-head">

    <!-- Ears -->
    <circle cx="-32" cy="-15" r="16" fill="#8B5E3C"/>
    <circle cx="-32" cy="-15" r="9" fill="#C4956A"/>
    <circle cx="32" cy="-15" r="16" fill="#8B5E3C"/>
    <circle cx="32" cy="-15" r="9" fill="#C4956A"/>

    <!-- Head -->
    <circle cx="0" cy="-10" r="32" fill="#A0714F"/>

    <!-- Face -->
    <ellipse cx="0" cy="0" rx="20" ry="16" fill="#C4956A"/>

    <!-- Eyes with glow -->
    <g class="eye-left">
      <circle cx="-8" cy="-7" r="5" fill="white"/>
      <circle cx="-7" cy="-7" r="3" fill="#1a1a2e"/>
      <circle cx="-6" cy="-8" r="1.2" fill="white"/>
    </g>
    <g class="eye-right">
      <circle cx="8" cy="-7" r="5" fill="white"/>
      <circle cx="9" cy="-7" r="3" fill="#1a1a2e"/>
      <circle cx="10" cy="-8" r="1.2" fill="white"/>
    </g>

    <!-- Eyebrows (determined look) -->
    <path d="M-14,-12 Q-8,-16 -3,-13" stroke="#6D4C2E" stroke-width="1.5" fill="none"/>
    <path d="M14,-12 Q8,-16 3,-13" stroke="#6D4C2E" stroke-width="1.5" fill="none"/>

    <!-- Nostrils -->
    <circle cx="-3" cy="3" r="2" fill="#8B5E3C"/>
    <circle cx="3" cy="3" r="2" fill="#8B5E3C"/>

    <!-- Smirk -->
    <path d="M-5,9 Q0,14 5,9" stroke="#8B5E3C" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="0" cy="35" rx="18" ry="14" fill="#A0714F"/>

    <!-- Arms -->
    <path d="M-16,30 Q-32,20 -28,40" stroke="#A0714F" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <path d="M16,30 Q32,20 28,40" stroke="#A0714F" stroke-width="5.5" fill="none" stroke-linecap="round"/>

    <!-- Hands -->
    <circle cx="-28" cy="40" r="4" fill="#C4956A"/>
    <circle cx="28" cy="40" r="4" fill="#C4956A"/>

    <!-- Banana in right hand! -->
    <g transform="translate(30, 35)" class="banana-emoji">
      <text x="0" y="0" text-anchor="middle" font-size="16">🍌</text>
    </g>

    <!-- Legs -->
    <path d="M-7,47 Q-10,60 -15,60" stroke="#A0714F" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M7,47 Q10,60 15,60" stroke="#A0714F" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-17" cy="61" rx="5" ry="3" fill="#C4956A"/>
    <ellipse cx="17" cy="61" rx="5" ry="3" fill="#C4956A"/>

    <!-- Tail -->
    <path d="M13,45 Q30,50 33,36 Q37,22 30,24" stroke="#A0714F" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Thought bubble with spinning banana -->
  <g class="banana-think" transform="translate(430, 70)">
    <circle cx="12" cy="12" r="3" fill="white" opacity="0.6"/>
    <circle cx="20" cy="6" r="4" fill="white" opacity="0.6"/>
    <ellipse cx="34" cy="0" rx="16" ry="12" fill="white" opacity="0.9"/>
    <text x="34" y="5" text-anchor="middle" font-size="18">🍌</text>
  </g>

  <!-- Question mark -->
  <text x="355" y="78" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFD700" class="question-mark" font-family="Arial">?</text>

  <!-- Glow circle pulse -->
  <circle cx="390" cy="130" r="65" fill="#58A6FF" style="animation: pulse-glow 3s ease-in-out infinite;"/>
</svg>
