<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @keyframes blink {
        0%, 90%, 100% { opacity:1; }
        94%, 96% { opacity:0; }
      }
      @keyframes searching {
        0%, 100% { transform: translate(0,0); }
        33% { transform: translate(3px,0); }
        66% { transform: translate(-2px,0); }
      }
      @keyframes tail-sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(12deg); }
      }
      .left-eye, .right-eye { animation: blink 3.5s ease-in-out infinite; }
      .eyeball { animation: searching 4s ease-in-out infinite; }
      .tail-anim { animation: tail-sway 2.5s ease-in-out infinite; transform-origin: 105px 195px; }
    </style>
  </defs>

  <rect width="300" height="300" fill="#0D1117" rx="150"/>

  <!-- body -->
  <ellipse cx="150" cy="200" rx="45" ry="35" fill="#A0714F"/>

  <!-- head -->
  <circle cx="150" cy="135" r="55" fill="#A0714F"/>

  <!-- ears -->
  <circle cx="95" cy="115" r="22" fill="#8B5E3C"/>
  <circle cx="95" cy="115" r="13" fill="#C4956A"/>
  <circle cx="205" cy="115" r="22" fill="#8B5E3C"/>
  <circle cx="205" cy="115" r="13" fill="#C4956A"/>

  <!-- face -->
  <ellipse cx="150" cy="145" rx="38" ry="32" fill="#C4956A"/>

  <!-- eyes looking right (toward banana) -->
  <g class="left-eye">
    <circle cx="132" cy="135" r="9" fill="white"/>
    <g class="eyeball">
      <circle cx="137" cy="135" r="5.5" fill="#1a1a2e"/>
      <circle cx="139" cy="133" r="2.5" fill="white"/>
    </g>
  </g>
  <g class="right-eye">
    <circle cx="168" cy="135" r="9" fill="white"/>
    <g class="eyeball">
      <circle cx="173" cy="135" r="5.5" fill="#1a1a2e"/>
      <circle cx="175" cy="133" r="2.5" fill="white"/>
    </g>
  </g>

  <!-- eyebrows (one raised — "huh?") -->
  <line x1="122" y1="120" x2="142" y2="126" stroke="#6D4C2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="178" y1="117" x2="158" y2="123" stroke="#6D4C2E" stroke-width="4" stroke-linecap="round"/>

  <!-- nose -->
  <circle cx="146" cy="150" r="4" fill="#8B5E3C"/>
  <circle cx="154" cy="150" r="4" fill="#8B5E3C"/>

  <!-- mouth -->
  <path d="M138 160 Q150 168 162 160" stroke="#6D4C2E" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- left arm (free, resting) -->
  <path d="M110 190 Q85 175 80 200" stroke="#A0714F" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="80" cy="202" r="8" fill="#C4956A"/>

  <!-- right arm (holding banana) -->
  <path d="M190 190 Q215 175 220 200" stroke="#A0714F" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="220" cy="202" r="8" fill="#C4956A"/>

  <!-- banana in right hand -->
  <g>
    <ellipse cx="232" cy="195" rx="16" ry="8" fill="#FEE12B" transform="rotate(-20 232 195)"/>
    <ellipse cx="246" cy="188" rx="4" ry="7" fill="#8B4513" transform="rotate(-20 246 188)"/>
  </g>

  <!-- legs -->
  <ellipse cx="130" cy="240" rx="12" ry="7" fill="#C4956A"/>
  <ellipse cx="170" cy="240" rx="12" ry="7" fill="#C4956A"/>
  <path d="M135 232 Q130 245 128 240" stroke="#A0714F" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M165 232 Q170 245 172 240" stroke="#A0714F" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- tail (left side, curling) -->
  <g class="tail-anim">
    <path d="M105 195 Q60 170 70 130 Q80 100 95 115" stroke="#A0714F" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ? animation — "where's the banana?" -->
  <g>
    <text x="150" y="68" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFD700" font-family="Arial">
      ?
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="68;60;68" dur="1.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- banana thought bubble -->
  <g>
    <circle cx="150" cy="86" r="10" fill="white" opacity="0.7">
      <animate attributeName="cy" values="86;78;86" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="89" text-anchor="middle" font-size="12">🍌</text>
  </g>
</svg>
