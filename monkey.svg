<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @keyframes look {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(0); }
        75% { transform: translateX(6px); }
      }
      @keyframes blink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes float-up {
        0% { opacity: 0; transform: translateY(20px); }
        20% { opacity: 1; transform: translateY(0); }
        80% { opacity: 1; transform: translateY(-5px); }
        100% { opacity: 0; transform: translateY(-15px); }
      }
      @keyframes appear {
        0% { opacity: 0; transform: scale(0) rotate(-30deg); }
        60% { opacity: 1; transform: scale(1.1) rotate(5deg); }
        80% { transform: scale(0.95) rotate(-2deg); }
        100% { opacity: 1; transform: scale(1) rotate(0); }
      }
      @keyframes scan-light {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      .monkey-head { animation: look 3s ease-in-out infinite; }
      .eye-left, .eye-right { animation: blink 4s ease-in-out infinite; }
      .banana-think { animation: float-up 3s ease-in-out infinite; }
      .question-mark { animation: bounce 1.5s ease-in-out infinite; }
      .stat-bar { animation: appear 0.8s ease-out forwards; opacity: 0; }
      .stat-bar:nth-child(2) { animation-delay: 0.3s; }
      .stat-bar:nth-child(3) { animation-delay: 0.6s; }
      .scan-line { animation: scan-light 2s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="400" height="200" rx="20" fill="#0D1117"/>

  <!-- Background grid (subtle) -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#00FF00" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#00FF00" stroke-width="0.5"/>
  </g>

  <!-- Monkey Group -->
  <g transform="translate(80, 100)" class="monkey-head">

    <!-- Ears -->
    <circle cx="-38" cy="-15" r="18" fill="#8B5E3C"/>
    <circle cx="-38" cy="-15" r="10" fill="#C4956A"/>
    <circle cx="38" cy="-15" r="18" fill="#8B5E3C"/>
    <circle cx="38" cy="-15" r="10" fill="#C4956A"/>

    <!-- Head -->
    <circle cx="0" cy="-10" r="35" fill="#A0714F"/>

    <!-- Face -->
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="#C4956A"/>

    <!-- Eyes -->
    <g class="eye-left">
      <circle cx="-9" cy="-8" r="5" fill="white"/>
      <circle cx="-8" cy="-8" r="3" fill="#1a1a2e"/>
      <circle cx="-7" cy="-9" r="1.2" fill="white"/>
    </g>
    <g class="eye-right">
      <circle cx="9" cy="-8" r="5" fill="white"/>
      <circle cx="10" cy="-8" r="3" fill="#1a1a2e"/>
      <circle cx="11" cy="-9" r="1.2" fill="white"/>
    </g>

    <!-- Nostrils -->
    <circle cx="-3" cy="3" r="2" fill="#8B5E3C"/>
    <circle cx="3" cy="3" r="2" fill="#8B5E3C"/>

    <!-- Mouth (thinking) -->
    <ellipse cx="0" cy="10" rx="6" ry="3" fill="none" stroke="#8B5E3C" stroke-width="1.5" stroke-dasharray="2,1"/>

    <!-- Body -->
    <ellipse cx="0" cy="40" rx="20" ry="15" fill="#A0714F"/>

    <!-- Arms (searching pose) -->
    <path d="M-18,35 Q-35,25 -30,45" stroke="#A0714F" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M18,35 Q35,25 30,45" stroke="#A0714F" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Hands -->
    <circle cx="-30" cy="45" r="4" fill="#C4956A"/>
    <circle cx="30" cy="45" r="4" fill="#C4956A"/>

    <!-- Legs -->
    <path d="M-8,53 Q-12,68 -18,68" stroke="#A0714F" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M8,53 Q12,68 18,68" stroke="#A0714F" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-20" cy="69" rx="6" ry="3" fill="#C4956A"/>
    <ellipse cx="20" cy="69" rx="6" ry="3" fill="#C4956A"/>

    <!-- Tail -->
    <path d="M15,50 Q35,55 38,40 Q42,25 35,28" stroke="#A0714F" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Thought bubble banana -->
  <g class="banana-think" transform="translate(130, 50)">
    <circle cx="15" cy="15" r="3" fill="white" opacity="0.6"/>
    <circle cx="25" cy="8" r="4" fill="white" opacity="0.6"/>
    <ellipse cx="40" cy="0" rx="18" ry="14" fill="white" opacity="0.9"/>
    <!-- Banana emoji inside thought -->
    <text x="40" y="5" text-anchor="middle" font-size="20">🍌</text>
  </g>

  <!-- Question mark floating -->
  <text x="65" y="60" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFD700" class="question-mark" font-family="Arial">?</text>

  <!-- Right side: Text + Stats -->
  <text x="190" y="45" font-size="20" font-weight="bold" fill="#58A6FF" font-family="Arial, sans-serif">🤖 Omar's Agent</text>
  <text x="190" y="68" font-size="13" fill="#8B949E" font-family="Arial, sans-serif">searching for bananas... &amp; building stuff</text>

  <!-- Fake stat bars -->
  <g transform="translate(190, 90)">
    <rect x="0" y="0" width="180" height="6" rx="3" fill="#21262D" class="stat-bar"/>
    <rect x="0" y="0" width="160" height="6" rx="3" fill="#58A6FF" class="stat-bar"/>
  </g>
  <g transform="translate(190, 105)">
    <rect x="0" y="0" width="180" height="6" rx="3" fill="#21262D" class="stat-bar"/>
    <rect x="0" y="0" width="130" height="6" rx="3" fill="#3FB950" class="stat-bar"/>
  </g>
  <g transform="translate(190, 120)">
    <rect x="0" y="0" width="180" height="6" rx="3" fill="#21262D" class="stat-bar"/>
    <rect x="0" y="0" width="100" height="6" rx="3" fill="#D29922" class="stat-bar"/>
  </g>
  <g transform="translate(190, 135)">
    <rect x="0" y="0" width="180" height="6" rx="3" fill="#21262D" class="stat-bar"/>
    <rect x="0" y="0" width="145" height="6" rx="3" fill="#F778BA" class="stat-bar"/>
  </g>

  <!-- Scanning line effect at bottom -->
  <line x1="15" y1="185" x2="385" y2="185" stroke="#00FF00" stroke-width="1" opacity="0.3" class="scan-line"/>
  <text x="20" y="193" font-size="9" fill="#00FF00" opacity="0.4" font-family="monospace">root@omars-vps:~$ _</text>
  <text x="320" y="193" font-size="9" fill="#00FF00" opacity="0.4" font-family="monospace">STATUS: ONLINE</text>
</svg>
